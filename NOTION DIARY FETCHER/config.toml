[content_writer]
provider = "openrouter"
recognized_domains = ["building", "career", "ai", "fitness", "philosophy"]

[reel_extractor]
provider = "openrouter"
whisper_model        = "base"
scenedetect_mode     = "adaptive"
content_threshold    = 20.0
min_transcript_chars = 20

# Beat-edit reference extraction (references/beat_edit/ subfolder). Model routing
# lives in config/openrouter_models.yaml (task: extract_reel_framework_beat_edit)
# like every other task — not special-cased here.
[reel_extractor.vision]
frame_sample_count = 6
frame_strategy     = "scene_midpoints"

[script_writer]
provider = "openrouter"

[logger]
log_dir        = "logs"   # relative to repo root (personal_brand/)
level          = "INFO"
retention_days = 7

[md_mirror]
scripts_dir = "scripts"
drafts_dir  = "drafts"